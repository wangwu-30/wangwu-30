---
layout: default
---
<article class="post-article">
  <a class="back-link" href="{{ '/blog/' | relative_url }}">← 返回 Blog</a>

  <header class="post-header">
    <p class="eyebrow">Blog</p>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
    </div>
    {% if page.description %}
      <p class="post-deck">{{ page.description }}</p>
    {% endif %}
  </header>

  <section class="prose post-body">
    {{ content }}
  </section>
</article>
