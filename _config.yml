title: "Archē & The Weave"
tagline: "数字文明重构宣言"
description: "关于软件、系统与数字文明的长期写作，包括一本按卷章展开的书与持续更新的 blog。"
lang: zh-CN
timezone: Asia/Shanghai
url: "https://wangwu-30.github.io"
baseurl: "/wangwu-30"
markdown: kramdown
permalink: pretty

collections:
  chapters:
    output: true
    permalink: /book/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: chapters
    values:
      layout: chapter
      section: book
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      section: blog
      permalink: /blog/:title/

kramdown:
  input: GFM
  hard_wrap: false

plugins: []

exclude:
  - README.md
  - .github
