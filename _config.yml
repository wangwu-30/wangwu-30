title: "Archē & The Weave"
tagline: "数字文明重构宣言"
description: "围绕软件、系统与数字文明的长期写作。这里有持续更新的 Blog，也有按卷展开的专栏。"
default_column_id: "arche-and-the-weave"
lang: zh-CN
timezone: Asia/Shanghai
url: "https://wangwu-30.github.io"
baseurl: "/wangwu-30"
markdown: kramdown
permalink: pretty

collections:
  chapters:
    output: true
    permalink: /book/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: chapters
    values:
      layout: chapter
      section: columns
      nav_section: columns
      column_id: arche-and-the-weave
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      section: blog
      permalink: /blog/:title/

kramdown:
  input: GFM
  hard_wrap: false

plugins: []

exclude:
  - README.md
  - .github
  - MAINTENANCE.md
  - "Archē & The Weave.md"
